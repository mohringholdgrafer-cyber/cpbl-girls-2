<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全能啦啦隊資訊站</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --team-dark: #0f0f0f;
            --team-light: #1f1f1f;
            --team-accent: #ffffff;
            --text-main: #ffffff;
            --text-sub: #888888;
            --border-color: #333333;
            /* 國籍專屬色 */
            --nat-kr: #4da6ff; 
            --nat-jp: #ff6666; 
            --nat-other: #d4af37; 
            --nat-tw: #66cc99;
        }

        * { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; }
        html, body { max-width: 100vw; overflow-x: hidden; background-color: var(--team-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        #bg-logo { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80vw; max-width: 600px; height: 80vh; opacity: 0.08; z-index: -1; background-size: contain; background-position: center; background-repeat: no-repeat; pointer-events: none; transition: all 0.5s ease; }

        /* 全域導覽列 */
        .main-nav { background-color: #000; display: flex; justify-content: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 50; }
        .main-nav-btn { background: transparent; border: none; color: #666; font-size: 16px; font-weight: 900; padding: 15px 30px; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .main-nav-btn:hover { color: #ccc; }
        .main-nav-btn.active { color: #fff; border-bottom-color: var(--team-accent, #fff); }

        .header { background-color: #0a0a0a; border-bottom: 1px solid var(--border-color); padding: 20px 40px; z-index: 10; position: relative; }
        
        .sport-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .sport-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 14px; font-weight: 700; transition: 0.3s; }
        .sport-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .team-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; min-height: 40px; }
        .tab-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-sub); cursor: pointer; font-size: 13px; font-weight: 700; border-radius: 10px; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; width: 120px; height: 85px; padding: 8px; }
        .tab-logo { width: 32px !important; height: 32px !important; object-fit: contain; display: none; }
        .tab-btn.has-logo .tab-logo { display: block; }
        .tab-btn.active { background-color: var(--team-accent); color: #000; border-color: var(--team-accent); }

        .filters { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .filters input, .filters select { background-color: #1a1a1a; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; font-size: 13px; border-radius: 4px; outline: none; }
        #searchInput { width: 250px; }

        /* 圖鑑網格 */
        .grid-container { max-width: 1200px; width: 100%; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; flex: 1; }
        
        /* 行程表版面 */
        .schedule-container { max-width: 800px; width: 100%; margin: 20px auto; padding: 0 20px; display: none; flex-direction: column; gap: 15px; flex: 1; }
        .schedule-card { background: var(--team-light); border-left: 5px solid var(--nat-tw); border-radius: 6px; padding: 15px; display: flex; gap: 20px; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .schedule-card:hover { transform: translateX(5px); border-left-color: var(--team-accent); }
        
        .sch-datetime { min-width: 80px; text-align: center; border-right: 1px solid #333; padding-right: 15px; }
        .sch-date { font-size: 20px; font-weight: 900; color: #fff; }
        .sch-time { font-size: 13px; color: var(--text-sub); margin-top: 4px; font-weight: 700; }
        
        .sch-avatar { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; object-position: top center; border: 2px solid #444; flex-shrink: 0; background-color: #000; }
        
        .sch-info { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .sch-name { font-size: 18px; font-weight: 900; color: #fff; }
        .sch-host { font-size: 13px; font-weight: 500; color: #aaa; display: flex; align-items: center; gap: 5px; }
        .sch-loc { font-size: 13px; color: #888; display: flex; align-items: center; gap: 5px; }

        /* 卡片設計 */
        .card { background-color: var(--team-light); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .photo-area { height: 320px; background-color: #111; position: relative; overflow: hidden; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
        .type-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; border: 1px solid rgba(255,255,255,0.3); z-index: 2; }
        .info-section { padding: 18px; }
        .header-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nickname { font-size: 20px; font-weight: 900; color: var(--team-accent); margin-right: 5px; }
        .ig-icon { width: 20px; height: 20px; fill: url(#ig-gradient); vertical-align: middle; }
        .data-grid { display: flex; flex-direction: column; gap: 6px; }
        .data-row { display: flex; justify-content: space-between; font-size: 13px; }
        .data-label { color: var(--text-sub); }
        .data-value { font-weight: 700; }
        
        /* 國籍文字顏色 */
        .text-kr { color: var(--nat-kr); } 
        .text-jp { color: var(--nat-jp); } 
        .text-tw { color: var(--nat-tw); }
        .text-other { color: var(--nat-other); }
        
        .loader { grid-column: 1 / -1; text-align: center; padding: 100px; color: var(--team-accent); font-weight: 700; }

        @media (max-width: 768px) {
            .header { padding: 15px 10px; }
            .title { display: none; }
            #searchInput { width: 100%; }
            .tab-btn { width: calc(33.3% - 8px); height: 75px; min-width: 90px; }
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 10px; margin-top: 10px; }
            .photo-area { height: 200px; }
            .nickname { font-size: 16px; }
            .info-section { padding: 12px; }
            
            .schedule-card { padding: 12px; gap: 12px; }
            .sch-datetime { min-width: 65px; padding-right: 10px; }
            .sch-date { font-size: 16px; }
            .sch-avatar { width: 50px; height: 50px; }
            .sch-name { font-size: 16px; }
            .sch-host, .sch-loc { font-size: 12px; }
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <linearGradient id="ig-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#f09433;" /><stop offset="100%" style="stop-color:#bc1888;" />
        </linearGradient>
    </svg>
    <div id="bg-logo"></div>

    <nav class="main-nav">
        <button class="main-nav-btn active" onclick="switchView('roster')">女孩圖鑑</button>
        <button class="main-nav-btn" onclick="switchView('schedule')">活動行程</button>
    </nav>

    <header class="header" id="roster-header">
        <div class="controls-container">
            <div class="sport-tabs" id="sport-tabs">
                <button class="sport-btn active" onclick="changeSport('全部')">全部</button>
                <button class="sport-btn" onclick="changeSport('職棒')">職棒</button>
                <button class="sport-btn" onclick="changeSport('職籃')">職籃</button>
                <button class="sport-btn" onclick="changeSport('排球')">排球</button>
            </div>
            <div class="team-tabs" id="tabs-container"></div>
            <div class="filters">
                <input type="text" id="searchInput" placeholder="搜尋姓名或綽號...">
                <select id="natFilter">
                    <option value="all">所有國籍</option>
                    <option value="韓國">韓國</option>
                    <option value="日本">日本</option>
                    <option value="臺灣">臺灣</option>
                    <option value="其他">其他國籍</option>
                </select>
                <select id="sortFilter">
                    <option value="default">預設排序</option>
                    <option value="heightDesc">身高 (高到矮)</option>
                    <option value="numberAsc">背號 (小到大)</option>
                </select>
            </div>
        </div>
    </header>

    <header class="header" id="schedule-header" style="display: none; text-align: center; padding: 15px;">
        <h2 style="font-size: 18px; color: #fff; letter-spacing: 1px;">🗓️ 近期活動行程表</h2>
    </header>

    <main class="grid-container" id="grid-container">
        <div class="loader">正在讀取雲端資料庫...</div>
    </main>

    <main class="schedule-container" id="schedule-container">
        <div class="loader">正在讀取行程表...</div>
    </main>

    <script>
        // =========================================================================
        // 🔴 真．絕對正確資料庫連線區 🔴
        // =========================================================================
        
        // 1. 女孩圖鑑 CSV 網址 (修正為你剛剛貼給我的這串絕對正確的網址！！)
        const rosterSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9l-hRhzMwcRdyQHsRs_97fja0Gg4RCcDDMk31u-dSbbQmk_JIUmbPTAj2gaNYmb6bYTwUvv4_1IxN/pub?gid=0&single=true&output=csv&t=" + new Date().getTime();
        
        // 2. 行程表 CSV 網址
        const scheduleSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdkYFMELT3B0v0e1rz3k0rhJUinpI9xStZzNGANOVvPG96OF-9Vz06guztjaw21k7HTaudblcpqwkQ/pub?gid=1901788112&single=true&output=csv&t=" + new Date().getTime();

        // =========================================================================

        const teamsConfig = {
            "全部": { dark: "#0f0f0f", light: "#1f1f1f", accent: "#ffffff", logo: "" },
            "Wing Stars": { dark: "#05120a", light: "#0a2414", accent: "#00e676", logo: "images/winstars_logo.png" },
            "Uni-Girls": { dark: "#140800", light: "#291000", accent: "#ff8c00", logo: "images/unilions_logo.png" },
            "Rakuten Girls": { dark: "#140202", light: "#2e0505", accent: "#ff3333", logo: "images/rakuten_logo.png" },
            "Passion Sisters": { dark: "#141200", light: "#292400", accent: "#ffea00", logo: "images/brothers_logo.png" },
            "Fubon Angels": { dark: "#020812", light: "#04152b", accent: "#33a1ff", logo: "images/fubon_logo.png" },
            "Dragon Beauties": { dark: "#170205", light: "#2e050b", accent: "#ff4d6d", logo: "images/dragons_logo.png" },
            "Formosa Sexy": { dark: "#000000", light: "#111111", accent: "#00ff00", logo: "" },
            "Pilots Crew": { dark: "#1a0d00", light: "#331a00", accent: "#ff6600", logo: "" },
            "電豹女": { dark: "#0d001a", light: "#1a0033", accent: "#cc33ff", logo: "" },
            "Tokki Cutie": { dark: "#001a1a", light: "#003333", accent: "#00ffff", logo: "" }
        };

        // 排序權重：確保台灣女孩在最後面
        const getNatWeight = (nat) => {
            if (nat === "韓國") return 1;
            if (nat === "日本") return 2;
            if (nat === "臺灣" || nat === "台灣") return 4;
            return 3; 
        };

        let db = [];
        let scheduleDb = [];
        let currentSport = "全部";
        let currentTeam = "全部";
        let isScheduleLoaded = false;

        function switchView(view) {
            document.querySelectorAll('.main-nav-btn').forEach(btn => btn.classList.remove('active'));
            if (view === 'roster') {
                document.querySelectorAll('.main-nav-btn')[0].classList.add('active');
                document.getElementById('roster-header').style.display = 'block';
                document.getElementById('grid-container').style.display = 'grid';
                document.getElementById('schedule-header').style.display = 'none';
                document.getElementById('schedule-container').style.display = 'none';
                changeTheme(currentTeam);
            } else {
                document.querySelectorAll('.main-nav-btn')[1].classList.add('active');
                document.getElementById('roster-header').style.display = 'none';
                document.getElementById('grid-container').style.display = 'none';
                document.getElementById('schedule-header').style.display = 'block';
                document.getElementById('schedule-container').style.display = 'flex';
                
                document.documentElement.style.setProperty('--team-dark', '#0f0f0f');
                document.getElementById('bg-logo').style.opacity = '0';
                
                if (!isScheduleLoaded) loadScheduleData();
            }
        }

        function loadRosterData() {
            Papa.parse(rosterSheetUrl, {
                download: true, 
                header: true, 
                skipEmptyLines: true,
                transformHeader: function(h) {
                    return h.trim().replace(/^\uFEFF/, ''); 
                },
                complete: function(results) {
                    db = results.data.filter(item => item.realName && item.realName.trim() !== '');
                    renderTeamTabs();
                    renderCards();
                },
                error: function(error) {
                    console.error("圖鑑載入失敗:", error);
                    document.getElementById('grid-container').innerHTML = '<div class="empty-state">無法讀取圖鑑資料庫，請檢查網址連線。<br>(如果是在電腦裡直接開啟，請嘗試使用 Netlify Drop 測試)</div>';
                }
            });
        }

        function loadScheduleData() {
            Papa.parse(scheduleSheetUrl, {
                download: true, 
                header: true, 
                skipEmptyLines: true,
                transformHeader: function(h) {
                    return h.trim().replace(/^\uFEFF/, ''); 
                },
                complete: function(results) {
                    scheduleDb = results.data.filter(item => item.date && item.date.trim() !== '');
                    renderSchedule();
                    isScheduleLoaded = true;
                },
                error: function(error) {
                    console.error("行程表載入失敗:", error);
                    document.getElementById('schedule-container').innerHTML = '<div class="empty-state">無法讀取行程表資料庫，請檢查網址連線。<br>(如果是在電腦裡直接開啟，請嘗試使用 Netlify Drop 測試)</div>';
                }
            });
        }

        function renderSchedule() {
            const container = document.getElementById('schedule-container');
            if (scheduleDb.length === 0) {
                container.innerHTML = '<div class="empty-state">目前尚未新增活動行程資料</div>';
                return;
            }

            scheduleDb.sort((a, b) => (a.date || "").localeCompare(b.date || ""));

            container.innerHTML = scheduleDb.map(s => {
                let avatarUrl = 'https://via.placeholder.com/100x100?text=Event'; 
                let matchedGirl = db.find(g => s.name && (s.name.includes(g.nickname) || s.name.includes(g.realName)));
                
                if (matchedGirl && matchedGirl.img) {
                    avatarUrl = matchedGirl.img;
                }

                return `
                    <div class="schedule-card">
                        <div class="sch-datetime">
                            <div class="sch-date">${s.date || '-'}</div>
                            <div class="sch-time">${s.time || '全天'}</div>
                        </div>
                        <img src="${avatarUrl}" class="sch-avatar" onerror="this.src='https://via.placeholder.com/100x100?text=Event'">
                        <div class="sch-info">
                            <div class="sch-name">✨ ${s.name || '未定'}</div>
                            <div class="sch-host">🏢 ${s.host || '無主辦單位'}</div>
                            <div class="sch-loc">📍 ${s.location || '地點待確認'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeSport(sport) {
            currentSport = sport;
            currentTeam = "全部";
            document.querySelectorAll('.sport-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === sport));
            renderTeamTabs();
            renderCards();
        }

        function renderTeamTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            let teamsInSport = ["全部"];
            db.forEach(item => {
                let itemType = (item.type || "").trim();
                if ((currentSport === "全部" || itemType === currentSport) && !teamsInSport.includes(item.team)) {
                    teamsInSport.push(item.team);
                }
            });

            teamsInSport.forEach(tName => {
                const config = teamsConfig[tName] || { accent: "#fff" };
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tName === currentTeam ? 'active' : ''}`;
                if (config.logo) {
                    btn.classList.add('has-logo');
                    btn.innerHTML = `<img src="${config.logo}" class="tab-logo" onerror="this.style.display='none'"><span>${tName}</span>`;
                } else {
                    btn.innerHTML = `<span>${tName}</span>`;
                }
                btn.onclick = () => {
                    currentTeam = tName;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    changeTheme(tName);
                    renderCards();
                };
                container.appendChild(btn);
            });
        }

        function changeTheme(tName) {
            const config = teamsConfig[tName] || teamsConfig["全部"];
            document.documentElement.style.setProperty('--team-dark', config.dark || "#0f0f0f");
            document.documentElement.style.setProperty('--team-light', config.light || "#1f1f1f");
            document.documentElement.style.setProperty('--team-accent', config.accent || "#ffffff");
            const bgLogo = document.getElementById('bg-logo');
            if (config.logo) { bgLogo.style.backgroundImage = `url('${config.logo}')`; bgLogo.style.opacity = '0.08'; } 
            else { bgLogo.style.backgroundImage = 'none'; bgLogo.style.opacity = '0'; }
        }

        function renderCards() {
            const container = document.getElementById('grid-container');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const nat = document.getElementById('natFilter').value;
            const sort = document.getElementById('sortFilter').value;

            let filtered = db.filter(c => {
                let cType = (c.type || "").trim();
                const matchSport = currentSport === "全部" || cType === currentSport;
                const matchTeam = currentTeam === "全部" || (c.team || "").trim() === currentTeam;
                const matchSearch = (c.nickname + c.realName).toLowerCase().includes(search);
                
                let matchNat = true;
                if (nat === '韓國') matchNat = c.nat === '韓國';
                else if (nat === '日本') matchNat = c.nat === '日本';
                else if (nat === '臺灣') matchNat = c.nat === '臺灣' || c.nat === '台灣';
                else if (nat === '其他') matchNat = !['韓國', '日本', '臺灣', '台灣'].includes(c.nat);

                return matchSport && matchTeam && matchSearch && matchNat;
            });

            filtered.sort((a, b) => {
                if (sort === 'heightDesc') return (parseInt(b.height)||0) - (parseInt(a.height)||0);
                if (sort === 'numberAsc') return (parseInt(a.num)||999) - (parseInt(b.num)||999);
                
                let wA = getNatWeight(a.nat);
                let wB = getNatWeight(b.nat);
                if (wA !== wB) return wA - wB; 
                return (parseInt(a.num)||999) - (parseInt(b.num)||999); 
            });

            container.innerHTML = filtered.length === 0 ? '<div class="empty-state">找不到符合條件的女孩</div>' : filtered.map(c => {
                
                let natClass = 'text-other';
                if (c.nat === '韓國') natClass = 'text-kr';
                else if (c.nat === '日本') natClass = 'text-jp';
                else if (c.nat === '臺灣' || c.nat === '台灣') natClass = 'text-tw';

                const accentColor = teamsConfig[c.team]?.accent || '#fff';
                const igHtml = c.ig ? `<a href="${c.ig}" target="_blank" class="ig-link"><svg class="ig-icon" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.332 3.608 1.308.975.975 1.245 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.332 2.633-1.308 3.608-.975.975-2.242 1.245-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.332-3.608-1.308-.975-.975-1.245-2.242-1.308-3.608-.058-1.266-.07-1.646-.07-4.85s.012-3.584.07-4.85c.062-1.366.332-2.633 1.308-3.608.975-.975 2.242-1.245 3.608-1.308 1.266-.058 1.646-.07 4.85-.07zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948s.014 3.667.072 4.947c.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072s3.667-.014 4.947-.072c4.358-.2 6.78-2.618 6.98-6.98.058-1.281.072-1.689.072-4.948s-.014-3.667-.072-4.947c-.2-4.358-2.618-6.78-6.98-6.98-1.281-.058-1.689-.072-4.948-.072zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>` : '';
                return `
                    <div class="card" style="border-top: 4px solid ${accentColor}">
                        <div class="type-badge">${c.type || '未分類'}</div>
                        <div class="photo-area">
                            <img src="${c.img}" onerror="this.src='https://via.placeholder.com/300x400?text=NO+IMAGE'">
                        </div>
                        <div class="info-section">
                            <div class="header-info">
                                <div>
                                    <div style="display:flex;align-items:center;"><span class="nickname">${c.nickname}</span>${igHtml}</div>
                                    <div style="font-size:12px;color:#888;">${c.realName}</div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:10px;color:#888;">#</div>
                                    <div style="font-size:20px;font-weight:900;">${c.num || '-'}</div>
                                </div>
                            </div>
                            <div class="data-grid">
                                <div class="data-row"><span class="data-label">球隊</span><span class="data-value" style="color:${accentColor}">${c.team}</span></div>
                                <div class="data-row"><span class="data-label">國籍</span><span class="data-value ${natClass}">${c.nat}</span></div>
                                <div class="data-row"><span class="data-label">身高</span><span class="data-value">${c.height ? c.height + ' cm' : 'N/A'}</span></div>
                            </div>
                            ${c.remark ? `<div style="font-size:11px;color:#d4af37;margin-top:10px;text-align:right;">${c.remark}</div>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }

        ['searchInput', 'natFilter', 'sortFilter'].forEach(id => {
            document.getElementById(id).addEventListener('input', renderCards);
        });
        
        // 啟動載入
        window.onload = loadRosterData;
    </script>
</body>
</html>
