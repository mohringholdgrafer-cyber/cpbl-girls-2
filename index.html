<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣啦啦隊資料庫 | </title>

      function gtag(){dataLayer.push(arguments);}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        /* =========================================
           🎨 運動風字體與核心變數
        ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@400;700;900&display=swap');

        :root {
            --bg-panel: #111418;
            --bg-card: #1c2128;
            --text-main: #f0f4f8;
            --text-sub: #a0aec0;
            --border-color: #2d3748;
            
            --team-accent: #ffffff;
            --event-accent: #ff5722;
            --schedule-accent: #00e676;
            --fav-accent: #ff4757;
            
            --sport-font: 'Oswald', sans-serif;
            --tc-font: 'Noto Sans TC', sans-serif;
        }

        * { box-sizing: border-box; font-family: var(--tc-font); margin: 0; padding: 0; }

        html, body {
            max-width: 100vw; overflow-x: hidden;
            background-color: #050505; color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; scroll-behavior: smooth;
        }

        body.no-scroll { overflow: hidden !important; }

        /* =========================================
           🔥 運動員概念輪播背景
        ========================================= */
        .sports-bg-slider { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; background: #000; overflow: hidden; }
        .sports-bg-slider::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, rgba(10,12,16,0.92) 0%, rgba(20,25,30,0.85) 100%); z-index: 1; pointer-events: none; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; filter: grayscale(30%) contrast(110%); animation: slideFade 24s infinite; z-index: 0; }
        .slide-1 { background-image: url('https://images.unsplash.com/photo-1511886929837-354d827aae26?q=80&w=2000&auto=format&fit=crop'); animation-delay: 0s; } 
        .slide-2 { background-image: url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2000&auto=format&fit=crop'); animation-delay: 8s; } 
        .slide-3 { background-image: url('https://images.unsplash.com/photo-1593787406536-369656f37fb2?q=80&w=2000&auto=format&fit=crop'); animation-delay: 16s; } 
        @keyframes slideFade { 0% { opacity: 0; transform: scale(1.05); } 10% { opacity: 0.4; transform: scale(1); } 33% { opacity: 0.4; transform: scale(1); } 43% { opacity: 0; transform: scale(1.05); } 100% { opacity: 0; } }

        /* =========================================
           ✨ 華麗入口畫面 & 載入動畫
        ========================================= */
        .landing-page { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1a1a24 0%, #050505 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; transition: opacity 0.5s ease; }
        .landing-content { text-align: center; animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .landing-title { font-size: 3.5rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; text-shadow: 4px 4px 0px rgba(229, 57, 53, 0.8); margin-bottom: 5px; transform: skewX(-5deg);}
        .landing-subtitle { font-family: var(--sport-font); font-size: 1.2rem; color: var(--text-sub); margin-bottom: 50px; letter-spacing: 4px; text-transform: uppercase; }
        .enter-btn { font-family: var(--sport-font); background: #fff; color: #000; padding: 15px 50px; font-size: 1.5rem; font-weight: 900; border: none; border-radius: 2px; transform: skewX(-10deg); cursor: pointer; box-shadow: 6px 6px 0px var(--event-accent); transition: all 0.2s; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 0 auto; }
        .enter-btn:hover:not(:disabled) { background: var(--event-accent); color: #fff; transform: skewX(-10deg) translate(-4px, -4px); box-shadow: 10px 10px 0px rgba(255,87,34,0.3); }
        .enter-btn:disabled { background: #333; color: #888; cursor: not-allowed; box-shadow: none; }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; transform: skewX(10deg); }
        @keyframes spin { to { transform: skewX(10deg) rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           主系統 Header 
        ========================================= */
        .header { background-color: rgba(17, 20, 24, 0.95); padding: 25px 20px 0; border-bottom: 4px solid var(--border-color); z-index: 50; position: relative;}
        .title { font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 25px; letter-spacing: 3px; color: #fff; text-transform: uppercase; }
        .controls-container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 15px; }
        
        /* 🏆 主導覽列 (四大模塊) */
        .main-nav { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-btn { font-family: var(--sport-font); background: var(--bg-card); border: 2px solid var(--border-color); color: var(--text-sub); padding: 12px 25px; font-size: 15px; font-weight: 900; border-radius: 4px; cursor: pointer; transition: all 0.2s; transform: skewX(-5deg); letter-spacing: 1px;}
        .nav-btn span { transform: skewX(5deg); display: inline-flex; align-items: center; gap: 8px; }
        .nav-btn:hover { border-color: #fff; color: #fff; transform: skewX(-5deg) translateY(-2px); box-shadow: 4px 4px 0px rgba(255,255,255,0.2); }
        .nav-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 4px 4px 0px rgba(255,255,255,0.3); }
        .nav-btn.btn-fav.active { background: var(--fav-accent); border-color: var(--fav-accent); color: #fff; box-shadow: 4px 4px 0px rgba(229,57,53,0.3); }
        .nav-btn.btn-schedule.active { background: var(--schedule-accent); border-color: var(--schedule-accent); color: #000; box-shadow: 4px 4px 0px rgba(0,230,118,0.3); }
        .nav-btn.btn-event.active { background: var(--event-accent); border-color: var(--event-accent); color: #000; box-shadow: 4px 4px 0px rgba(255,87,34,0.3); }
        .btn-icon { width: 18px; height: 18px; fill: currentColor; }

        /* 🏆 次級導覽列 (運動分類膠囊) */
        .sub-nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding-top: 18px; margin-top: 5px; border-top: 2px dashed var(--border-color); }
        .sub-btn { font-family: var(--tc-font); background: transparent; border: 1px solid var(--text-sub); color: var(--text-sub); padding: 6px 18px; font-size: 13px; font-weight: 900; border-radius: 30px; cursor: pointer; transition: 0.2s; letter-spacing: 1px;}
        .sub-btn:hover { border-color: #fff; color: #fff; transform: translateY(-2px);}
        .sub-btn.active { background: var(--text-sub); color: #000; border-color: var(--text-sub); }

        .team-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding-top: 20px; border-top: 2px dashed var(--border-color); }
        .league-group { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 15px; }
        .league-title { font-family: var(--sport-font); font-size: 14px; font-weight: 700; color: #fff; background: var(--border-color); padding: 4px 20px; border-radius: 2px; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; transform: skewX(-10deg); }
        .tab-btn { background: var(--bg-card); border: 2px solid transparent; color: var(--text-sub); cursor: pointer; font-size: 13px; font-weight: 900; border-radius: 4px; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-width: 110px; height: 95px; padding: 12px; border-bottom: 4px solid var(--border-color); }
        .tab-btn:hover { background: #252c36; transform: translateY(-3px); color: #fff; border-bottom-color: var(--team-accent); }
        .tab-btn.active { background-color: var(--team-accent); color: #111; font-weight: 900; box-shadow: 0 8px 15px rgba(0,0,0,0.6), 0 0 15px var(--team-accent); border-color: var(--team-accent); transform: translateY(-3px); border-bottom: 4px solid rgba(0,0,0,0.3); }
        .tab-logo { width: 40px; height: 40px; object-fit: contain; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        .sticky-filter-wrapper { position: sticky; top: 0; z-index: 40; background: rgba(17, 20, 24, 0.98); padding: 15px 20px; border-bottom: 2px solid var(--border-color); box-shadow: 0 10px 20px rgba(0,0,0,0.7); }
        .filters { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
        .filters input, .filters select { background-color: var(--bg-card); border: 2px solid var(--border-color); color: var(--text-main); padding: 11px 16px; font-size: 14px; font-weight: 700; border-radius: 2px; outline: none; transition: all 0.2s;}
        .filters input:focus, .filters select:focus { border-color: #fff; background-color: #252c36; }

        /* =========================================
           ✨ 女孩卡片網格 
        ========================================= */
        #main-content { flex: 1; padding-top: 15px; position: relative; }
        .grid-container { max-width: 1200px; width: 100%; margin: 30px auto 60px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background-color: var(--bg-card); border: 2px solid var(--border-color); border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; transition: all 0.2s; box-shadow: 8px 8px 0px rgba(0,0,0,0.6); cursor: pointer; position: relative; }
        .card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px rgba(0,0,0,0.8); border-color: #fff; }
        
        .photo-area { height: 350px; background-color: #000; overflow: hidden; position: relative; border-bottom: 4px solid var(--border-color); }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; object-position: top center; transition: transform 0.5s; }
        .card:hover .photo-area img { transform: scale(1.05); }

        .sport-tags { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 5; }
        .sport-tag { font-family: var(--tc-font); font-size: 12px; font-weight: 900; color: #fff; padding: 6px 12px; border-radius: 2px; text-align: center; box-shadow: 4px 4px 0px rgba(0,0,0,0.5); letter-spacing: 1px; text-transform: uppercase; transform: skewX(-5deg); }
        .tag-baseball { background: #1e3799; border: 2px solid #000; } 
        .tag-basketball { background: #f39c12; border: 2px solid #000; color: #000; } 
        .tag-volleyball { background: #00b894; border: 2px solid #000; color: #000; }
        .tag-other { background: #8e44ad; border: 2px solid #000; color: #fff; } 

        .fav-btn { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: #000; transition: 0.2s;}
        .fav-btn:hover { transform: scale(1.15); background: var(--fav-accent); }
        .fav-icon { width: 20px; height: 20px; fill: none; stroke: #000; stroke-width: 2.5; transition: 0.2s; }
        .fav-btn:hover .fav-icon { stroke: #fff; }
        .fav-btn.active { background: var(--fav-accent); }
        .fav-btn.active .fav-icon { fill: #fff; stroke: #fff; animation: heartPop 0.3s; }

        .info-section { padding: 25px; background: var(--bg-card); }
        .header-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed var(--border-color); }
        .nickname-container { display: flex; align-items: center; gap: 8px; }
        .nickname { font-size: 24px; font-weight: 900; color: var(--team-accent, #fff); line-height: 1; text-transform: uppercase; }
        .realname { font-size: 14px; color: var(--text-sub); margin-top: 8px; font-weight: 700; letter-spacing: 1px; }
        .number { font-family: var(--sport-font); font-size: 20px; font-weight: 900; color: var(--team-accent, #ffeb3b); background: #111418; padding: 4px 12px; border-radius: 4px; border: 2px solid var(--border-color); transform: skewX(-5deg); box-shadow: 3px 3px 0px rgba(0,0,0,0.5); text-align: center; }

        .data-grid { display: flex; flex-direction: column; gap: 12px; }
        .data-row { display: flex; justify-content: space-between; font-size: 14px; align-items: center; }
        .data-label { color: var(--text-sub); font-weight: 700; min-width: 65px; }
        .data-value { font-weight: 900; color: #fff; text-align: right; font-family: var(--sport-font); letter-spacing: 0.5px; font-size: 15px;}

        /* 🏀 🏆 完美「田」字型數據面板與獨立備註 */
        .stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); margin: 15px 0; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; background: #111418; box-shadow: inset 0 2px 8px rgba(0,0,0,0.5); }
        .stat-box { padding: 12px 5px; text-align: center; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
        .stat-box:nth-child(even) { border-right: none; }
        .stat-box:nth-child(n+3) { border-bottom: none; }
        .stat-label { font-size: 11px; color: var(--text-sub); font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; }
        .stat-value { font-size: 15px; font-weight: 900; color: #fff; font-family: var(--sport-font); letter-spacing: 0.5px; }
        .note-box { margin-top: 10px; padding: 12px 15px; background: rgba(255, 87, 34, 0.1); border-left: 4px solid var(--event-accent); font-size: 13px; color: #cbd5e1; font-weight: 700; line-height: 1.5; border-radius: 0 4px 4px 0; }

        .ig-link { display: inline-flex; vertical-align: middle; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0.9; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.8)); margin-left: 10px; }
        .ig-link:hover { transform: scale(1.2) rotate(-5deg); opacity: 1; filter: drop-shadow(0 0 8px rgba(220,39,67,0.6)); }
        .ig-icon { width: 22px; height: 22px; fill: url(#ig-grad-final); display: block; }

        /* =========================================
           ✨ 個人詳細彈窗
        ========================================= */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--bg-panel); border: 4px solid #fff; border-radius: 8px; width: 100%; max-width: 460px; position: relative; transform: scale(0.9); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 15px 15px 0px rgba(0,0,0,0.6); overflow: hidden; max-height: 90dvh; display: flex; flex-direction: column; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-layout { flex: 1; min-height: 0; display: flex; flex-direction: column; }
        
        .modal-photo { flex-shrink: 0; width: 100%; height: 400px; object-fit: cover; object-position: top center; border-bottom: 6px solid var(--modal-accent, #fff); }
        .modal-body { flex: 1; min-height: 0; padding: 30px; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: max(40px, env(safe-area-inset-bottom)); }

        .modal-close { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; transition: 0.2s; backdrop-filter: blur(4px); }
        .modal-close:hover { background: var(--fav-accent); transform: scale(1.1); border-color: transparent;}
        .modal-close svg { width: 20px; height: 20px; stroke: #fff; stroke-width: 3; fill: none; }

        .modal-header-info { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px dashed var(--border-color); padding-bottom: 20px; margin-bottom: 20px; }
        .modal-nickname { font-size: 32px; font-weight: 900; color: var(--modal-accent, #fff); line-height: 1.1; margin-bottom: 5px; text-transform: uppercase; }
        .modal-realname { font-size: 15px; color: var(--text-sub); font-weight: 700; letter-spacing: 1px; }
        .modal-number { font-family: var(--sport-font); font-size: 26px; font-weight: 900; color: var(--modal-accent, #ffeb3b); background: #111418; padding: 4px 15px; border-radius: 4px; border: 2px solid var(--border-color); transform: skewX(-5deg); box-shadow: 4px 4px 0px rgba(0,0,0,0.5); width: fit-content; flex-shrink: 0; }

        .modal-data-grid { display: flex; flex-direction: column; gap: 12px; }
        .modal-data-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;}
        .modal-data-label { color: var(--text-sub); font-weight: 700; font-family: var(--tc-font); }
        .modal-data-value { font-weight: 900; color: #fff; text-align: right; font-family: var(--sport-font); letter-spacing: 0.5px; font-size: 16px; }

        .modal-ig-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: #15191e; color: #fff; text-decoration: none; padding: 16px; margin-top: 30px; font-weight: 900; border: 2px solid #2d3748; transition: 0.3s; font-family: var(--sport-font); letter-spacing: 1px; box-shadow: 6px 6px 0px rgba(0,0,0,0.8); border-radius: 4px; }
        .modal-ig-btn:hover { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); border-color: transparent; transform: translate(-2px,-2px); box-shadow: 8px 8px 0px rgba(0,0,0,0.9);}
        .modal-ig-btn svg { width: 22px; height: 22px; fill: url(#ig-grad-final); transition: 0.3s; position: relative; z-index: 1;}
        .modal-ig-btn span { position: relative; z-index: 1; }
        .modal-ig-btn:hover svg { fill: #fff; transform: scale(1.1); }

        .schedule-jump-btn { transition: 0.2s; cursor: pointer; }
        .schedule-jump-btn:hover { transform: translateY(-3px); box-shadow: 4px 4px 0px rgba(0,0,0,0.6) !important; filter: brightness(1.2); }

        /* =========================================
           ✨ 班表大廳與表格
        ========================================= */
        .schedule-selection-wrapper { display: flex; flex-direction: column; gap: 40px; align-items: center; width: 100%; padding: 30px 0; }
        .schedule-league-section { width: 100%; max-width: 950px; margin: 0 auto; background: rgba(17,20,24,0.8); padding: 30px; border-radius: 8px; border: 2px solid var(--border-color); }
        .schedule-league-title { font-family: var(--sport-font); font-size: 24px; font-weight: 900; color: #000; padding: 5px 20px; margin-bottom: 25px; transform: skewX(-5deg); display: inline-block; letter-spacing: 2px;}
        .schedule-teams-grid { display: flex; flex-wrap: wrap; gap: 18px; justify-content: flex-start; }
        .schedule-team-btn { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 4px; padding: 20px; display: flex; align-items: center; gap: 18px; cursor: pointer; width: calc(33.333% - 12px); border-bottom: 4px solid var(--btn-accent, #fff); transition: 0.2s; }
        .schedule-team-btn:hover { background: #252c36; transform: translateY(-4px); border-color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.5);}
        .schedule-team-btn img { width: 55px; height: 55px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .schedule-team-btn span { color: #fff; font-weight: 900; font-size: 18px; letter-spacing: 1px; }

        .schedule-desktop { display: block; width: 100%; }
        .schedule-wrapper { width: 100%; overflow-x: auto; background: var(--bg-panel); border: 4px solid var(--border-color); box-shadow: 0 15px 40px rgba(0,0,0,0.8); padding-bottom: 5px;}
        .schedule-table { width: 100%; border-collapse: collapse; text-align: center; min-width: 750px; table-layout: fixed;}
        .schedule-table th, .schedule-table td { padding: 20px 8px; border-bottom: 2px solid var(--border-color); border-right: 2px solid var(--border-color);}
        .schedule-table th { background: #1a1e24; position: sticky; top: 0; z-index: 2; border-bottom: 4px solid var(--team-accent); vertical-align: bottom;}
        .schedule-table tr:hover td { background: #252c36; }
        .schedule-table td:first-child { border-right: 4px solid var(--border-color); background: #15191e; font-weight: 900; position: sticky; left: 0; z-index: 1; width: 120px; min-width: 120px; box-shadow: 5px 0 15px rgba(0,0,0,0.5);}
        .schedule-table th:first-child { border-right: 4px solid var(--border-color); background: #1a1e24; position: sticky; left: 0; z-index: 3; width: 120px; min-width: 120px; color: #fff; font-family: var(--sport-font); font-size: 20px; letter-spacing: 2px; vertical-align: middle;}
        .schedule-table th:not(:first-child), .schedule-table td:not(:first-child) { width: 105px; min-width: 105px; }

        .schedule-girl-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 12px; height: 100%; cursor: pointer; }
        .schedule-girl-img { width: 65px; height: 65px; border-radius: 4px; object-fit: cover; object-position: top center; border: 2px solid var(--border-color); background: #252c36; transition: 0.2s; }
        .schedule-table th:hover .schedule-girl-img { border-color: #fff; border-bottom: 4px solid var(--team-accent); transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        .schedule-girl-name-container { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 4px; width: 100%; min-height: 35px; }

        </div>
    </footer>

    <script>
        // =========================================================================
        // 核心邏輯與完整資料庫
        // =========================================================================
        let myFavorites = JSON.parse(localStorage.getItem('cheer_favorites')) || [];

        const teamThemes = {
            "全部啦啦隊": { accent: "#ffeb3b", logo: "", noLogo: true, league: "" },
            "Wing Stars_棒球": { accent: "#00e676", logo: "images/winstars_logo.png", noLogo: false, league: "CPBL" },
            "Passion Sisters_棒球": { accent: "#ffeb3b", logo: "images/brothers_logo.png", noLogo: false, league: "CPBL" },

            "Dragon Beauties": { accent: "#e91e63", logo: "images/dragons_logo.png", noLogo: false, league: "CPBL" },

            "Taishin Wonders": { accent: "#f44336", logo: "", noLogo: true, league: "TPBL" },
            "Leopard Girls": { accent: "#ffffff", logo: "", noLogo: true, league: "TPBL" },
            "New Taipei Queens": { accent: "#ffeb3b", logo: "", noLogo: true, league: "TPBL" },
            "Aqua Mermaids": { accent: "#03a9f4", logo: "", noLogo: true, league: "TPBL" },
            "Pilots Crew": { accent: "#ff9800", logo: "", noLogo: true, league: "P. LEAGUE+" },
            "Youngkey Girls": { accent: "#69f0ae", logo: "", noLogo: true, league: "P. LEAGUE+" },
            "Wing Stars_籃球": { accent: "#00e676", logo: "", noLogo: true, league: "P. LEAGUE+" },
            "Fubon Angels_籃球": { accent: "#2196f3", logo: "", noLogo: true, league: "P. LEAGUE+" },
            "Tokki Cutie": { accent: "#ff9800", logo: "", noLogo: true, league: "排球" },
            "Little witches": { accent: "#00e5ff", logo: "", noLogo: true, league: "排球" },
            "Peach Girls": { accent: "#f06292", logo: "", noLogo: true, league: "排球" },
            "Wing Stars_排球": { accent: "#29b6f6", logo: "", noLogo: true, league: "排球" },
            "LuxyGirls": { accent: "#e040fb", logo: "", noLogo: true, league: "其他" }
        };

        const monthMap = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        const weekMap = ["Sun.", "Mon.", "Tue.", "Wed.", "Thu.", "Fri.", "Sat."];

        function parseDateFlexible(dStr) {
            if(!dStr) return null;
            let s = String(dStr).replace(/年|月|-/g, '/').replace(/日/g, '').trim();
            let p = s.split('/').filter(x => x !== '');
            let y, m, d;
            if(p.length >= 3) { y = parseInt(p[0]); m = parseInt(p[1]); d = parseInt(p[2]); }
            else if(p.length === 2) { y = new Date().getFullYear(); m = parseInt(p[0]); d = parseInt(p[1]); }
            else return null;
            if(isNaN(m) || isNaN(d)) return null;
            let jsDate = new Date(y, m-1, d);
            return { year:y, month:m, day:d, week:weekMap[jsDate.getDay()], num:parseInt(`${y}${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}`), monStr: monthMap[m-1] };
        }

        function parseGirlDOB(d) {
            if(!d) return { num:0, mmdd:9999 };
            let s = String(d).replace(/年|月|-/g, '/').replace(/日/g, '').trim();
            let p = s.split('/').filter(x => x !== '');
            let y=0, m=0, d_val=0;
            if(p.length >= 3) { y = parseInt(p[0]); m = parseInt(p[1]); d_val = parseInt(p[2]); } 
            else if(p.length === 2) { m = parseInt(p[0]); d_val = parseInt(p[1]); }
            return { num: parseInt(`${String(y).padStart(4,'0')}${String(m).padStart(2,'0')}${String(d_val).padStart(2,'0')}`), mmdd: parseInt(`${String(m).padStart(2,'0')}${String(d_val).padStart(2,'0')}`) };
        }

        let dbGirls = [], dbEvents = [], dbSchedules = [];
        let currentMode = "girls", currentSport = "全部", currentTeam = "全部啦啦隊";
        let currentScheduleTeam = null, currentScheduleSport = null; 

        // 🏆 強制快取 V4
        const CACHE_KEY = "tw_cheerleader_cache_v4";
        const CACHE_TIME = 60 * 60 * 1000; 

        function enableEnterButton() {
            const btn = document.getElementById('enter-btn');
            const spinner = document.getElementById('loading-spinner');
            const text = document.getElementById('enter-text');
            if(btn) {
                btn.disabled = false;
                if(spinner) spinner.style.display = 'none';
                if(text) text.innerHTML = '進入賽季 ENTER SEASON';
            }
        }

        function loadData() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const parsed = JSON.parse(cached);
                    if (Date.now() - parsed.timestamp < CACHE_TIME) {
                        dbGirls = parsed.dbGirls; dbEvents = parsed.dbEvents; dbSchedules = parsed.dbSchedules;
                        init(); enableEnterButton(); return; 
                    }
                }
            } catch(e) { }

            const t = new Date().getTime();
            const baseSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9l-hRhzMwcRdyQHsRs_97fja0Gg4RCcDDMk31u-dSbbQmk_JIUmbPTAj2gaNYmb6bYTwUvv4_1IxN/pub?output=csv";
            
            Papa.parse(`${baseSheetUrl}&gid=0&t=${t}`, {
                download: true, header: true, skipEmptyLines: true,
                transformHeader: h => h.trim().toLowerCase().replace(/[\s_]/g, ""),
                complete: res => {
                    dbGirls = res.data.filter(i => i.realname);
                    Papa.parse(`${baseSheetUrl}&gid=925411186&t=${t}`, {
                        download: true, header: true, skipEmptyLines: true,
                        transformHeader: h => h.trim().toLowerCase().replace(/[\s_]/g, ""),
                        complete: resEv => { 
                            dbEvents = resEv.data.map(e => ({ ...e, safeDate: parseDateFlexible(e.date) })).filter(e => e.safeDate); 
                            Papa.parse(`${baseSheetUrl}&gid=1702657458&t=${t}`, {
                                download: true, header: true, skipEmptyLines: true,
                                transformHeader: h => h.trim().toLowerCase().replace(/[\s_]/g, ""),
                                complete: resSch => {
                                    let flat = [];
                                    resSch.data.forEach(row => {
                                        let sport = (row.sport || "").trim();
                                        let team = (row.team || "").trim();
                                        let name = (row.name || row.nickname || row['綽號'] || "").trim();
                                        let dStr = String(row.dates || row.date || "");
                                        let dParts = dStr.split(/[,\s\n、，]+/);
                                        dParts.forEach(d => {
                                            const p = parseDateFlexible(d);
                                            if(p && name) flat.push({ sport, team, name, safeDate: p });
                                        });
                                    });
                                    dbSchedules = flat;
                                    init(); enableEnterButton();
                                    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), dbGirls, dbEvents, dbSchedules })); } catch(e) { }
                                }
                            });
                        }
                    });
                }
            });
        }

        function init() {
            updateTeamTabs();
            window.renderContent();
        }

        // 🏆 雙層導覽列邏輯
        window.setMode = function(mode, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            currentMode = mode;
            currentTeam = "全部啦啦隊"; 
            currentScheduleTeam = null; 
            currentScheduleSport = null; 

            const showSubNav = (currentMode === 'girls' || currentMode === 'favorites');
            document.getElementById('sub-nav-sports').style.display = showSubNav ? 'flex' : 'none';
            document.getElementById('extra-filters').style.display = showSubNav ? 'flex' : 'none';
            document.getElementById('filter-bar').style.display = (currentMode === 'schedule') ? 'none' : 'block';
            
            updateTeamTabs();
            applyTheme(currentMode === 'schedule' ? "全部啦啦隊" : currentTeam);
            window.renderContent();
        };

        window.setSport = function(sport, btn) {
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            currentSport = sport;
            currentTeam = "全部啦啦隊"; 
            
            updateTeamTabs();
            applyTheme("全部啦啦隊");
            window.renderContent();
        };

        window.toggleFavorite = function(name, event) {
            event.stopPropagation();
            if (myFavorites.includes(name)) {
                myFavorites = myFavorites.filter(n => n !== name);
            } else {
                myFavorites.push(name);
            }
            localStorage.setItem('cheer_favorites', JSON.stringify(myFavorites));
            window.renderContent(); 
        };

        function applyTheme(tName) {
            const safeTeam = (tName || "").trim();
            const safeSport = currentSport === "全部" ? "" : currentSport;
            const config = teamThemes[`${safeTeam}_${safeSport}`] || teamThemes[safeTeam] || teamThemes["全部啦啦隊"];
            document.documentElement.style.setProperty('--team-accent', config.accent);
        }

        function updateTeamTabs() {
            const container = document.getElementById('tabs-container');
            if (currentMode === 'schedule' || currentMode === 'events' || currentMode === 'favorites' || (currentMode === 'girls' && currentSport === "全部")) { 
                container.style.display = 'none'; return; 
            }
            
            const teamsSet = new Set();
            dbGirls.forEach(c => { 
                if ((c.sport || "").includes(currentSport)) {
                    if (c.team && c.team.trim() !== "") teamsSet.add(c.team.trim()); 
                }
            });
            const activeTeams = Array.from(teamsSet).sort();
            
            container.innerHTML = ''; container.style.display = 'flex';
            container.appendChild(createTeamBtn("全部啦啦隊"));
            
            if (currentSport === "籃球") {
                const getLeague = (t) => (teamThemes[`${t}_籃球`] || teamThemes[t] || {}).league;
                renderLeagueGroup(container, "TPBL 職籃聯盟", activeTeams.filter(t => getLeague(t) === "TPBL"));
                renderLeagueGroup(container, "P. LEAGUE+ 職籃聯盟", activeTeams.filter(t => getLeague(t) === "P. LEAGUE+"));
            } else { 
                activeTeams.forEach(t => container.appendChild(createTeamBtn(t))); 
            }
        }

        function renderLeagueGroup(container, title, teams) {
            if(teams.length === 0) return;
            const group = document.createElement('div');
            group.className = 'league-group';
            group.innerHTML = `<div class="league-title">${title}</div><div style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;"></div>`;
            teams.forEach(t => group.lastChild.appendChild(createTeamBtn(t)));
            container.appendChild(group);
        }

        function createTeamBtn(tName) {
            const safeTeam = (tName || "").trim();
            const safeSport = currentSport === "全部" ? "" : currentSport;
            const config = teamThemes[`${safeTeam}_${safeSport}`] || teamThemes[safeTeam] || { accent: "#ccc", logo: "", noLogo: false };
            const btn = document.createElement('button');
            btn.className = `tab-btn ${safeTeam === currentTeam ? 'active' : ''}`;
            
            const logoHtml = (config.logo && !config.noLogo) ? `<img src="${config.logo}" class="tab-logo">` : ``;
            btn.innerHTML = `${logoHtml}<span>${safeTeam}</span>`;
            btn.style.setProperty('--team-accent', config.accent); 
            btn.onclick = () => { 
                currentTeam = safeTeam; 
                document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.remove('active')); 
                btn.classList.add('active'); 
                applyTheme(safeTeam); 
                window.renderContent(); 
            };
            return btn;
        }

        window.renderContent = function() {
            const grid = document.getElementById('grid-container'), list = document.getElementById('event-container'), sched = document.getElementById('schedule-container');
            grid.style.display = list.style.display = sched.style.display = 'none';
            window.scrollTo({top: 0});
            
            if (currentMode === 'girls' || currentMode === 'favorites') { grid.style.display = 'grid'; renderGirls(); }
            else if (currentMode === 'events') { list.style.display = 'flex'; renderEvents(); }
            else if (currentMode === 'schedule') { 
                sched.style.display = 'flex'; 
                if (currentScheduleTeam) { renderScheduleMatrix(); } 
                else { renderScheduleSelection(); }
            }
        };

        // =========================================================================
        // 女孩卡片與彈窗 (包含四宮格設計與備註分離)
        // =========================================================================
        function renderGirls() {
            const container = document.getElementById('grid-container');
            const search = (document.getElementById('searchInput').value || "").toLowerCase().trim();
            const nat = document.getElementById('natFilter').value;
            const zodiac = document.getElementById('zodiacFilter').value;
            const sort = document.getElementById('sortFilter').value;

            let result = dbGirls.filter(c => {
                if (currentMode === 'favorites' && !myFavorites.includes(c.realname)) return false;
                const ms = currentSport === "全部" || (c.sport || "").includes(currentSport);
                const mt = currentTeam === "全部啦啦隊" || (c.team || "").trim() === currentTeam;
                const mS = search === "" || (c.nickname || "").toLowerCase().includes(search) || (c.realname || "").toLowerCase().includes(search);
                const mN = nat === 'all' || (c.nat || "").includes(nat);
                const cz = (c.zodiac || "").trim().replace("魔羯","摩羯").replace("白羊","牡羊");
                return (currentMode === 'favorites' ? true : (ms && mt)) && mS && mN && (zodiac === 'all' || cz === zodiac);
            });

            if ((currentSport === "全部" && currentTeam === "全部啦啦隊") || currentMode === 'favorites') {
                const mMap = new Map();
                result.forEach(c => { 
                    const k = (c.realname || "").trim(); if (!k) return;
                    if (!mMap.has(k)) {
                        mMap.set(k, { ...c, mS: [c.sport || ""], mT: [c.team || ""], mN: [c.num || ""] }); 
                    } else { 
                        let e = mMap.get(k); 
                        if (!e.mS.includes(c.sport || "")) e.mS.push(c.sport || ""); 
                        if (!e.mT.includes(c.team || "")) e.mT.push(c.team || ""); 
                        if (!e.mN.includes(c.num || "") && c.num && c.num !== "-") e.mN.push(c.num || ""); 
                    } 
                });
                result = Array.from(mMap.values());
            }

            if (currentMode === 'favorites' && result.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:100px 50px; color:var(--text-sub); grid-column: 1 / -1; font-weight:700; line-height:2;">球隊休息室目前是空的！<br>趕快去點擊球員卡右上角的愛心標記，把喜歡的女孩加入名單吧！</div>`;
                return;
            }

            // 🏆 終極精準排序邏輯：嚴守 國籍 -> 練習生墊底 -> 背號
            result.sort((a,b) => {
                if(sort === 'default') { 
                    const getNatWeight = (nat) => {
                        if ((nat || "").includes("韓國")) return 1;
                        if ((nat || "").includes("日本")) return 2;
                        if ((nat || "").includes("臺灣") || (nat || "").includes("台灣")) return 4;
                        return 3;
                    };
                    let wA = getNatWeight(a.nat); let wB = getNatWeight(b.nat);
                    if (wA !== wB) return wA - wB;

                    const isLastA = ((a.note || a['備註'] || a.備註 || "").includes('練習生') || (a.note || a['備註'] || a.備註 || "").includes('培訓生') || !a.num || a.num === "-") ? 1 : 0;
                    const isLastB = ((b.note || b['備註'] || b.備註 || "").includes('練習生') || (b.note || b['備註'] || b.備註 || "").includes('培訓生') || !b.num || b.num === "-") ? 1 : 0;
                    if (isLastA !== isLastB) return isLastA - isLastB;

                    let nA = parseInt(String((a.mN||[a.num])[0] || "").replace(/#/g, '')) || 999;
                    let nB = parseInt(String((b.mN||[b.num])[0] || "").replace(/#/g, '')) || 999;
                    return nA - nB;
                }
                
                if(sort === 'birthdayAsc') return parseGirlDOB(a.dob).mmdd - parseGirlDOB(b.dob).mmdd;
                if(sort === 'ageAsc') return parseGirlDOB(b.dob).num - parseGirlDOB(a.dob).num; 
                if(sort === 'heightDesc') return (parseFloat(b.height) || 0) - (parseFloat(a.height) || 0);
                if(sort === 'numberAsc') {
                    let nA = String((a.mN||[a.num])[0] || "").replace(/#/g, '');
                    let nB = String((b.mN||[b.num])[0] || "").replace(/#/g, '');
                    return (parseInt(nA) || 999) - (parseInt(nB) || 999);
                }
                return 0;
            });

            container.innerHTML = result.map(c => {
                const teams = (c.mT || [c.team || ""]).map(t => t.trim()).filter(t => t);
                const sports = (c.mS || [c.sport || ""]);
                const cardAccent = (teamThemes[`${teams[0]}_${currentSport==="全部"?"":currentSport}`] || teamThemes[teams[0]] || teamThemes["全部啦啦隊"]).accent;
                const isFav = myFavorites.includes(c.realname);
                
                let sportTags = sports.map(s=>`<div class="sport-tag tag-${s.includes("棒")?'baseball':s.includes("籃")?'basketball':s.includes("排")?'volleyball':'other'}">${s}</div>`).join('');
                let displayNum = (c.mN||[c.num]).filter(n=>n && n!=="-").map(n => '#' + String(n).replace(/#/g,'')).join(' ') || "-";
                let noteText = (c.note || c['備註'] || c.備註 || "").trim();

                return `
                <div class="card" style="border-bottom: 6px solid ${cardAccent}; --team-accent: ${cardAccent}" onclick="window.openModal('${c.realname}')">
                    <div class="photo-area">
                        <div class="sport-tags">${sportTags}</div>
                        <div class="fav-btn ${isFav ? 'active' : ''}" onclick="window.toggleFavorite('${c.realname}', event)">
                            <svg class="fav-icon" viewBox="0 0 24 24"><use xlink:href="#icon-heart"></use></svg>
                        </div>
                        ${c.img?`<img src="${c.img}" loading="lazy">`:''}
                    </div>
                    <div class="info-section">
                        <div class="header-info">
                            <div>
                                <div class="nickname-container" style="display:flex; align-items:center; gap:8px;">
                                    <div class="nickname" style="color:${cardAccent}">${c.nickname}</div>
                                    ${c.ig ? `<a href="${c.ig}" target="_blank" class="ig-link" onclick="event.stopPropagation()"><svg class="ig-icon"><use xlink:href="#icon-ig"></use></svg></a>` : ''}
                                </div>
                                <div class="realname" style="font-size:14px; color:var(--text-sub); font-weight:700; margin-top:8px; letter-spacing:1px;">${c.realname}</div>
                            </div>
                            <div class="number">${displayNum}</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-row" style="border-bottom: 2px dashed var(--border-color); padding-bottom: 10px;"><span class="data-label">球隊 UNIT</span><span class="data-value" style="color:${cardAccent}">${teams.join(' / ')}</span></div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box"><span class="stat-label">國籍 NAT</span><span class="stat-value">${c.nat || "-"}</span></div>
                            <div class="stat-box"><span class="stat-label">身高 HEIGHT</span><span class="stat-value">${c.height ? c.height + ' cm' : '-'}</span></div>
                            <div class="stat-box"><span class="stat-label">星座 SIGN</span><span class="stat-value">${c.zodiac || "-"}</span></div>
                            <div class="stat-box"><span class="stat-label">生日 DOB</span><span class="stat-value">${c.dob || "-"}</span></div>
                        </div>
                        ${noteText ? `<div class="note-box">${noteText}</div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        window.openModal = function(name) {
            const allRows = dbGirls.filter(g => (g.realname||"").trim() === name.trim() || (g.nickname||"").trim() === name.trim());
            if(allRows.length === 0) return;
            
            const c = allRows[0]; 
            const teams = [...new Set(allRows.map(g => (g.team||"").trim()).filter(t => t))];
            const sports = [...new Set(allRows.map(g => (g.sport||"").trim()).filter(s => s))];
            const nums = [...new Set(allRows.map(g => (g.num||"").trim()).filter(n => n && n !== "-"))].map(n => '#' + String(n).replace(/#/g,''));
            
            const lookupTeam = teams[0] || "全部啦啦隊"; 
            const lookupSport = currentSport === "全部" ? "" : currentSport;
            const themeConfig = teamThemes[`${lookupTeam}_${lookupSport}`] || teamThemes[lookupTeam] || teamThemes["全部啦啦隊"];
            const cardAccent = themeConfig.accent;
            const noteText = (c.note || c['備註'] || c.備註 || "").trim();

            let tags = sports.filter(s => s).map(s => `<div class="sport-tag tag-${s.includes("棒")?'baseball':s.includes("籃")?'basketball':s.includes("排")?'volleyball':'other'}">${s}</div>`).join('');

            const today = new Date();
            const currentYear = today.getFullYear();
            const currentMonth = today.getMonth() + 1;
            const todayNum = parseInt(`${currentYear}${String(currentMonth).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`);

            // 🏆 過期班表自動隱藏
            let herSchedules = dbSchedules.filter(s => 
                (s.name === (c.realname||"").trim() || s.name === (c.nickname||"").trim()) && 
                s.safeDate.year === currentYear && 
                s.safeDate.month === currentMonth &&
                s.safeDate.num >= todayNum
            );

            let scheduleHtml = '';
            if (herSchedules.length > 0) {
                herSchedules.sort((a, b) => a.safeDate.num - b.safeDate.num);
                let dateBoxes = '';
                let renderedKeys = [];

                herSchedules.forEach(s => {
                    let key = s.safeDate.num + '|' + s.team + '|' + s.sport;
                    if (!renderedKeys.includes(key)) {
                        renderedKeys.push(key);
                        dateBoxes += `
                        <div class="schedule-jump-btn" onclick="window.goToSchedule('${s.team}', '${s.sport}')" style="background: #111418; border: 1px solid ${cardAccent}; border-bottom: 3px solid ${cardAccent}; padding: 8px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; box-shadow: 2px 2px 0px rgba(0,0,0,0.3); min-width: 75px; cursor: pointer; transition: 0.2s;">
                            <span style="font-size: 11px; color: var(--text-sub); font-weight: 700;">${s.safeDate.monStr} / ${s.safeDate.week}</span>
                            <span style="font-family: var(--sport-font); font-size: 24px; font-weight: 900; color: #fff; line-height: 1.1; margin: 4px 0;">${String(s.safeDate.day).padStart(2,'0')}</span>
                            <span style="font-size: 11px; color: ${cardAccent}; text-align: center; line-height: 1.2; font-weight: 700;">${s.team}<br>${s.sport}</span>
                        </div>`;
                    }
                });

                scheduleHtml = `
                    <div style="margin-top: 20px; border-top: 2px dashed var(--border-color); padding-top: 20px;">
                        <div style="font-family: var(--sport-font); font-size: 18px; font-weight: 900; color: ${cardAccent}; margin-bottom: 12px; letter-spacing: 1px; transform: skewX(-5deg);">本月應援 SCHEDULE <span style="font-size: 12px; color: var(--text-sub); font-family: var(--tc-font); font-weight: normal; margin-left: 5px;">(點擊前往)</span></div>
                        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                            ${dateBoxes}
                        </div>
                    </div>`;
            } else {
                scheduleHtml = `
                    <div style="margin-top: 20px; border-top: 2px dashed var(--border-color); padding-top: 20px;">
                        <div style="font-family: var(--sport-font); font-size: 18px; font-weight: 900; color: var(--text-sub); margin-bottom: 12px; letter-spacing: 1px; transform: skewX(-5deg);">本月應援 SCHEDULE</div>
                        <div style="font-size: 14px; color: #6a7a90; font-weight: 700;">本月目前尚無後續班表。</div>
                    </div>`;
            }

            document.documentElement.style.setProperty('--modal-accent', cardAccent);

            document.getElementById('modal-dynamic-content').innerHTML = `
                ${c.img ? `<img src="${c.img}" class="modal-photo">` : ''}
                <div class="modal-body">
                    <div style="position: absolute; top: 15px; left: 15px; display:flex; gap:6px;">${tags}</div>
                    
                    <div class="modal-header-info">
                        <div>
                            <div class="modal-nickname" style="color:${cardAccent}">${c.nickname}</div>
                            <div class="modal-realname">${c.realname}</div>
                        </div>
                        <div class="modal-number">${nums.join(' ') || "-"}</div>
                    </div>
                    
                    <div class="modal-data-grid">
                        <div class="modal-data-row" style="border-bottom: 2px dashed var(--border-color); padding-bottom: 15px; margin-bottom: 5px;"><span class="modal-data-label">所屬球隊 UNIT</span><span class="modal-data-value" style="color:${cardAccent}">${teams.join(' / ')}</span></div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="stat-label">國籍 NAT</span><span class="stat-value">${c.nat || "-"}</span></div>
                        <div class="stat-box"><span class="stat-label">身高 HEIGHT</span><span class="stat-value">${c.height ? c.height + ' cm' : 'N/A'}</span></div>
                        <div class="stat-box"><span class="stat-label">星座 SIGN</span><span class="stat-value">${c.zodiac || "-"}</span></div>
                        <div class="stat-box"><span class="stat-label">生日 DOB</span><span class="stat-value">${c.dob || "-"}</span></div>
                    </div>
                    ${noteText ? `<div class="note-box">${noteText}</div>` : ''}
                    
                    ${scheduleHtml}
                    ${c.ig ? `<a href="${c.ig}" target="_blank" class="modal-ig-btn"><svg viewBox="0 0 24 24"><use xlink:href="#icon-ig"></use></svg><span>前往 INSTAGRAM</span></a>` : ''}
                </div>
            `;

            document.getElementById('girl-modal').classList.add('active');
            document.body.classList.add('no-scroll'); 
        };

        window.closeModal = function() { 
            document.getElementById('girl-modal').classList.remove('active'); 
            document.body.classList.remove('no-scroll'); 
        };

        window.goToSchedule = function(team, sport) {
            closeModal();
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            let targetBtn = document.querySelector('.nav-btn.btn-schedule');
            if(targetBtn) targetBtn.classList.add('active');
            
            currentMode = 'schedule';
            currentScheduleTeam = team;
            currentScheduleSport = sport;
            
            document.getElementById('extra-filters').style.display = 'none';
            document.getElementById('filter-bar').style.display = 'none';
            document.getElementById('tabs-container').style.display = 'none';
            document.getElementById('sub-nav-sports').style.display = 'none';
            
            let cfgKey = teamThemes[`${team}_${sport}`] ? `${team}_${sport}` : team;
            let config = teamThemes[cfgKey] || teamThemes["全部啦啦隊"];
            document.documentElement.style.setProperty('--team-accent', config.accent);
            
            window.renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // =========================================================================
        // 班表系統 (大廳、電腦矩陣與手機卡片時間軸)
        // =========================================================================
        window.selectScheduleTeam = function(t, sp) { 
            currentScheduleTeam = t; currentScheduleSport = sp;
            let cfgKey = teamThemes[`${t}_${sp}`] ? `${t}_${sp}` : t;
            let config = teamThemes[cfgKey] || teamThemes["全部啦啦隊"];
            document.documentElement.style.setProperty('--team-accent', config.accent);
            window.renderContent(); 
        };
        
        window.backToScheduleSelection = function() { 
            currentScheduleTeam = null; currentScheduleSport = null;
            applyTheme("全部啦啦隊"); 
            window.renderContent(); 
        };

        window.renderScheduleSelection = function() {
            const container = document.getElementById('schedule-container');
            let available = [];
            
            dbSchedules.forEach(s => { 
                if(s.team && !available.find(a => a.team === s.team && a.sport === s.sport)) {
                    available.push(s); 
                }
            });
            
            if (available.length === 0) {
               container.innerHTML = '<div style="text-align:center; padding:100px 50px; color:var(--text-sub); font-size:18px; font-weight:700;">目前沒有班表資料可以顯示！</div>';
               return;
            }

            let leagueGroups = { "CPBL 職業棒球": "#00b0ff", "TPBL 職籃聯盟": "#ff9800", "P. LEAGUE+ 職籃聯盟": "#ffeb3b", "職業排球": "#ff4081", "其他賽事活動": "#a0aec0" };
            let html = `<div class="schedule-selection-wrapper">`;
            
            for(let key in leagueGroups) {
                let teams = available.filter(a => {
                    const cfg = teamThemes[a.team+"_"+a.sport] || teamThemes[a.team] || {};
                    const l = cfg.league || "";
                    if(key === "其他賽事活動") return !l && !(a.sport||"").includes("棒球") && !(a.sport||"").includes("籃") && !(a.sport||"").includes("排球");
                    if(key.includes("CPBL")) return l === "CPBL" || (a.sport||"").includes("棒球");
                    if(key.includes("TPBL")) return l === "TPBL";
                    if(key.includes("P. LEAGUE+")) return l === "P. LEAGUE+";
                    if(key.includes("排球")) return l === "排球" || (a.sport||"").includes("排球");
                    return false;
                });
                
                if(teams.length) {
                    html += `<div class="schedule-league-section"><div class="schedule-league-title" style="background:${leagueGroups[key]}">${key}</div><div class="schedule-teams-grid">` +
                    teams.sort((a,b)=>a.team.localeCompare(b.team,'zh-TW')).map(t => {
                        const cfg = teamThemes[t.team+"_"+t.sport] || teamThemes[t.team] || { accent: "#fff" };
                        return `<div class="schedule-team-btn" style="--btn-accent:${cfg.accent}" onclick="window.selectScheduleTeam('${t.team}', '${t.sport}'); window.scrollTo({top:0});">
                            ${(cfg.logo && !cfg.noLogo)?`<img src="${cfg.logo}">`:''}<span>${t.team}</span>
                        </div>`;
                    }).join('') + `</div></div>`;
                }
            }
            container.innerHTML = html + `</div>`;
        };

        window.renderScheduleMatrix = function() {
            const container = document.getElementById('schedule-container');
            let data = dbSchedules.filter(s => s.team === currentScheduleTeam && s.sport === currentScheduleSport);
            
            const todayNum = parseInt(`${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}${String(new Date().getDate()).padStart(2,'0')}`);
            data = data.filter(s => s.safeDate.num >= todayNum);
            
            if(data.length === 0) {
                container.innerHTML = `<button class="back-btn" onclick="window.backToScheduleSelection()"><span><svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:3;vertical-align:middle;margin-right:5px;"><polyline points="15 18 9 12 15 6"></polyline></svg> 返回大廳 BACK</span></button><div style="text-align:center; padding:100px 50px; color:var(--text-sub); font-weight:700; font-size:18px;">此隊伍目前無未來班表資料。</div>`;
                return;
            }

            let girls = [...new Set(data.map(s => s.name))];
            
            girls.sort((nameA, nameB) => {
                const gA = dbGirls.find(girl => (girl.realname || "").trim() === nameA || (girl.nickname || "").trim() === nameA) || {};
                const gB = dbGirls.find(girl => (girl.realname || "").trim() === nameB || (girl.nickname || "").trim() === nameB) || {};
                
                const getNatWeight = (nat) => {
                    if ((nat || "").includes("韓國")) return 1;
                    if ((nat || "").includes("日本")) return 2;
                    if ((nat || "").includes("臺灣") || (nat || "").includes("台灣")) return 4;
                    return 3;
                };
                
                let wA = getNatWeight(gA.nat);
                let wB = getNatWeight(gB.nat);
                if (wA !== wB) return wA - wB;
                
                const isLastA = ((gA.note || gA['備註'] || gA.備註 || "").includes('練習生') || (gA.note || gA['備註'] || gA.備註 || "").includes('培訓生') || !gA.num || gA.num === "-") ? 1 : 0;
                const isLastB = ((gB.note || gB['備註'] || gB.備註 || "").includes('練習生') || (gB.note || gB['備註'] || gB.備註 || "").includes('培訓生') || !gB.num || gB.num === "-") ? 1 : 0;
                if (isLastA !== isLastB) return isLastA - isLastB;
                
                let nA = parseInt(String(gA.num || "").replace(/#/g, '')) || 999;
                let nB = parseInt(String(gB.num || "").replace(/#/g, '')) || 999;
                if (nA !== nB) return nA - nB;
                
                return nameA.localeCompare(nameB, 'zh-TW');
            });

            let dates = [...new Set(data.map(s => s.safeDate.num))].sort((a,b)=>a-b);
            const cfg = teamThemes[currentScheduleTeam+"_"+currentScheduleSport] || teamThemes[currentScheduleTeam] || { accent: "#fff" };

            let html = `<div style="width:100%; max-width: 1200px; margin: 0 auto;"><button class="back-btn" onclick="window.backToScheduleSelection()"><span><svg class="back-icon" viewBox="0 0 24 24"><use xlink:href="#icon-back"></use></svg>返回大廳 BACK</span></button>`;
            
            let desktopHtml = `<div class="schedule-desktop"><div class="schedule-wrapper"><table class="schedule-table"><thead><tr><th>ROSTER</th>` + 
                girls.map(n => {
                    const g = dbGirls.find(girl => (girl.realname||"").trim() === n || (girl.nickname||"").trim() === n);
                    const showReal = g ? g.realname : n;
                    const showNick = (g && g.nickname && g.nickname !== g.realname) ? g.nickname : "";
                    return `<th onclick="window.openModal('${n}')" style="cursor:pointer;"><div class="schedule-girl-col"><img src="${g?g.img:''}" class="schedule-girl-img" loading="lazy"><div class="schedule-girl-name-container"><span class="schedule-girl-name">${showReal}</span>${showNick ? `<span class="schedule-girl-nickname">${showNick}</span>` : ''}</div></div></th>`;
                }).join('') + `</tr></thead><tbody>`;
            
            dates.forEach(dNum => {
                const dInfo = data.find(s => s.safeDate.num === dNum).safeDate;
                desktopHtml += `<tr><td><div class="schedule-date">${dInfo.month}/${String(dInfo.day).padStart(2,'0')}</div><div class="schedule-day">${dInfo.week}</div></td>` +
                    girls.map(gn => {
                        const work = data.some(s => s.safeDate.num === dNum && s.name === gn);
                        return `<td>${work?`<svg class="schedule-heart" style="fill:${cfg.accent}"><use xlink:href="#icon-heart"></use></svg>`:''}</td>`;
                    }).join('') + `</tr>`;
            });
            desktopHtml += `</tbody></table></div></div>`;

            let mobileHtml = `<div class="schedule-mobile">`;
            dates.forEach(dNum => {
                const dInfo = data.find(s => s.safeDate.num === dNum).safeDate;
                let attendees = girls.filter(gn => data.some(s => s.safeDate.num === dNum && s.name === gn));
                
                if (attendees.length > 0) {
                    mobileHtml += `<div class="timeline-card" style="--team-accent:${cfg.accent}">
                        <div class="timeline-date">${dInfo.month}/${String(dInfo.day).padStart(2,'0')} <span style="font-size:13px;color:var(--text-sub);">${dInfo.week}</span></div>
                        <div class="timeline-roster">`;
                    
                    attendees.forEach(gn => {
                        const g = dbGirls.find(girl => (girl.realname||"").trim() === gn || (girl.nickname||"").trim() === gn);
                        const showReal = g ? g.realname : gn;
                        const showNick = (g && g.nickname && g.nickname !== g.realname) ? g.nickname : "";
                        mobileHtml += `<div class="timeline-girl" onclick="window.openModal('${showReal}')" style="align-items:center; display:flex;">
                            <img src="${g?g.img:''}" loading="lazy">
                            <div style="display:flex; flex-direction:column; line-height:1.2;">
                                <span>${showReal}</span>
                                ${showNick ? `<span style="font-size:10px; color:var(--team-accent);">${showNick}</span>` : ''}
                            </div>
                        </div>`;
                    });
                    mobileHtml += `</div></div>`;
                }
            });
            mobileHtml += `</div>`;

            container.innerHTML = html + desktopHtml + mobileHtml + `</div>`;
        };

        // =========================================================================
        // 外籍行程渲染 (包含 Google Map 連結)
        // =========================================================================
        window.renderEvents = function() {
            const search = (document.getElementById('searchInput').value || "").toLowerCase().trim();
            const todayNum = parseInt(`${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}${String(new Date().getDate()).padStart(2,'0')}`);
            
            let filtered = dbEvents.filter(e => {
                if (search === "") return true;
                const girlsStr = (e.girls || "").toLowerCase();
                if ((e.eventname||"").toLowerCase().includes(search) || girlsStr.includes(search) || (e.host||"").toLowerCase().includes(search)) return true;
                return dbGirls.some(g => (g.nickname||"").toLowerCase().includes(search) && girlsStr.includes((g.realname||"").toLowerCase()));
            });
            
            filtered.sort((a,b) => a.safeDate.num - b.safeDate.num);
            const up = filtered.filter(e => e.safeDate.num >= todayNum); 
            const ex = filtered.filter(e => e.safeDate.num < todayNum).reverse(); 
            
            const buildItemHtml = (e, isExp) => {
                const attendHtml = (e.girls || "").split(/[,\s、，\n]+/).map(n => {
                    const name = n.trim(); if(!name) return '';
                    const g = dbGirls.find(girl => (girl.realname||"").trim() === name || (girl.nickname||"").trim() === name);
                    let showNick = (g && g.nickname && g.nickname !== g.realname) ? g.nickname : "";
                    return `<div class="girl-hero-card" onclick="window.openModal('${g?g.realname:name}')">${g?`<img src="${g.img}" class="girl-hero-img" loading="lazy">`:`<div class="girl-hero-img default-avatar"><svg viewBox="0 0 24 24"><use xlink:href="#icon-user"></use></svg></div>`}<div class="girl-hero-name-container"><span class="girl-hero-name">${g?g.realname:name}</span>${showNick?`<span class="girl-hero-nickname">${showNick}</span>`:''}</div></div>`;
                }).join('');
                
                const addressRaw = (e.address || "").trim();
                const addressDisplay = addressRaw 
                    ? `<a href="http://googleusercontent.com/maps.google.com/4{encodeURIComponent(addressRaw)}" target="_blank" style="color:inherit; text-decoration:none; border-bottom:1px dashed var(--event-accent);">${addressRaw}</a>`
                    : "請見球團官網";

                return `<div class="event-item ${isExp?'expired':''}">${isExp?'<div class="expired-badge">已結束 PAST</div>':''}<div class="event-date-box"><span class="date-month">${e.safeDate.monStr}</span><span class="date-day">${String(e.safeDate.day).padStart(2,'0')}</span></div><div class="event-content-wrapper"><div class="event-girls-hero">${attendHtml}</div><div class="event-details-sub"><div class="event-title-small">${e.eventname||"賽事活動未定"}</div><div class="event-meta-row"><span class="meta-item"><i>🕒</i> ${e.time||"TBA"}</span><span class="meta-item"><i>📍</i> ${addressDisplay}</span>${e.host?`<span class="meta-item"><i>🏢</i> ${e.host}</span>`:''}</div></div></div></div>`;
            };
            
            let html = up.length?up.map(e=>buildItemHtml(e,false)).join(''):(search===""?'<div style="text-align:center;padding:100px 50px;color:var(--text-sub); font-weight:700;">目前沒有近期的活動賽事。</div>':'');
            if(ex.length) html += `<div class="event-section-divider">歷史賽事紀錄 ARCHIVE</div>` + ex.map(e=>buildItemHtml(e,true)).join('');
            document.getElementById('event-container').innerHTML = html;
        };

        // 註冊 Service Worker 讓 PWA 生效
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW註冊失敗', err));
            });
        }

        // 啟動程式
        window.onload = loadData;
    </script>
</body>
</html>
